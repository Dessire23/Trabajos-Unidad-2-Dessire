<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .destacado {
            font-weight: bold;
            color: #2e7d32; /* Verde esmeralda */
        }
        #Dessire {
            font-style: italic;
            color: #7d2a6c; /* Morado */
        }
        #manuel {
            text-decoration: underline;
            color: #1565c0; /* Azul intenso */
        }
    </style>
</head>
<body>
    <p id="destacado">Este párrafo es importante</p>
    <p>Este párrafo es normal</p>
    <ul>
        <li id="Dessire">Elemento 1</li>
        <li id="Manuel">Elemento 2</li>
        <li id="destacado">Elemento 3</li>
    </ul>
</body>
</html>
