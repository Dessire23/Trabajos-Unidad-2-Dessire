<!DOCTYPE html>
<html lang="en">
<head>
    <style>
        p {
            /* Transformación de texto */
            text-transform: none; /* o uppercase, lowercase, capitalize */

            /* Decoración de texto */
            text-decoration: none; /* o underline, line-through, overline */

            /* Alineación de texto */
            text-align: left; /* o center, right, justify */

            /* Altura de línea */
            line-height: 1.5;

            /* Espaciado entre letras */
            letter-spacing: 1px;

            /* Espaciado entre palabras */
            word-spacing: 2px;
            color: blue;
        }
    </style>
</head>
<body>
    <p>dessire no esta celosa </p>
</body>
</html>
